[global]
type=global
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

# Authentication Section 
[1001]
type=auth
auth_type=userpass
password=1234
username=1002

[1002]
type=auth
auth_type=userpass
password=1234
username=1002

[1003]
type=auth
auth_type=userpass
password=1234
username=1003


# AOR ()
[1001]
type=aor
max_contacts=1

[1002]
type=aor
max_contacts=1

[1003]
type=aor
max_contacts=1

#Endpoint Sections 
[1001]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1001
aors=1001
transport=transport-udp
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733
media_encryption=sdes

[1002]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1002
aors=1002
transport=transport-udp
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733
media_encryption=sdes

[1003]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1003
aors=1003
transport=transport-udp
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733
media_encryption=sdes

